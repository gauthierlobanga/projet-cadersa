<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" width="100%" height="100%">
  <defs>
    <!-- Couleurs globales -->
    <style>
      .green-fill { fill: #00A651; }
      .black-fill { fill: #111111; }
      .white-stroke { stroke: #FFFFFF; stroke-width: 3; fill: none; stroke-linecap: round; }
      .text-cadersa { font-family: 'Times New Roman', Times, Georgia, serif; font-size: 92px; font-weight: bold; letter-spacing: 2px; }
      .text-asbl { font-family: 'Georgia', 'Times New Roman', serif; font-size: 92px; font-weight: 500; }
    </style>
  </defs>

  <!-- ==================== LOGO / GLOBE (HAUT) ==================== -->
  <g transform="translate(50, -10)">
    <!-- Base du dôme vert -->
    <path class="green-fill" d="M 60,200 
             C 60,80 180,10 300,10 
             C 420,10 540,80 540,200 
             C 520,200 510,185 500,195 
             C 485,210 475,210 465,190 
             C 455,170 440,175 430,195 
             C 410,215 390,200 375,180 
             C 365,170 355,175 350,190 
             C 340,210 325,215 310,200 
             C 290,180 270,180 260,195 
             C 250,210 230,215 220,190 
             C 210,170 195,170 185,185 
             C 170,210 150,210 140,195 
             C 125,180 115,185 105,200 
             C 90,215 75,210 60,200 Z" />

    <!-- Lignes de latitude (Horizontales) -->
    <path class="white-stroke" d="M 85,150 Q 300,180 515,150" />
    <path class="white-stroke" d="M 140,100 Q 300,125 460,100" />
    <path class="white-stroke" d="M 210,50 Q 300,65 390,50" />

    <!-- Lignes de longitude (Verticales / Méridiens) -->
    <path class="white-stroke" d="M 300,10 L 300,190" />
    <path class="white-stroke" d="M 300,10 Q 230,80 190,180" />
    <path class="white-stroke" d="M 300,10 Q 370,80 410,180" />
    <path class="white-stroke" d="M 300,10 Q 150,80 105,160" />
    <path class="white-stroke" d="M 300,10 Q 450,80 495,160" />
  </g>

  <!-- ==================== TEXTE (MILIEU) ==================== -->
  <g transform="translate(50, 335)">
    <!-- CADERSA en Noir -->
    <text x="0" y="0" class="text-cadersa black-fill">CADERSA</text>
    <!-- a.s.b.l en Vert -->
    <text x="490" y="0" class="text-asbl green-fill">a.s.b.l</text>
  </g>

  <!-- ==================== BANDEAU GÉOMÉTRIQUE (BAS) ==================== -->
  <!-- Forme symétrique moderne stylisée sous le texte principal -->
  <g transform="translate(85, 385)">
    <path class="green-fill" d="M 10,10 
             L 50,10 
             L 80,45 
             L 190,45 
             L 198,30 
             L 205,45 
             L 212,10 
             L 223,10 
             L 216,45 
             L 223,45 
             L 231,10 
             L 238,10 
             L 245,45 
             L 253,30 
             L 261,45 
             L 371,45 
             L 401,10 
             L 441,10 
             L 416,55 
             L 35,55 Z" />
  </g>
</svg>
